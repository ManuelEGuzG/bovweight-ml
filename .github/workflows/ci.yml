name: CI/CD – ML Service

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:

  # CI – Tests

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        run: pip install flask flask-cors python-dotenv numpy opencv-python-headless Pillow pytest

      - name: Ejecutar tests
        run: pytest tests/ -v


  # CI – Build Docker (verifica que compila)

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build imagen Docker
        run: docker build -t bovweight-ml:latest .

  # CD – Deploy al VPS (solo main)

  deploy:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy vía SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd /var/www/bovweight/ml
            git pull origin main
            source venv/bin/activate
            pip install flask flask-cors python-dotenv numpy opencv-python-headless Pillow
            sudo systemctl restart bovweight-ml
            echo "✅ Deploy ML completado"