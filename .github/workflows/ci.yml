name: CI/CD - ML Service

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        run: |
          pip install flask flask-cors python-dotenv numpy opencv-python-headless Pillow pytest

      - name: Ejecutar tests
        run: pytest tests/ -v

  docker-build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Build imagen Docker
        run: docker build -t bovweight-ml:latest .

  deploy:
    runs-on: ubuntu-latest
    needs: docker-build
    if: false

    steps:
      - name: Deploy desactivado temporalmente
        run: echo "Deploy desactivado porque no hay VPS configurado."
            